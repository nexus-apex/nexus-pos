{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} POSCustomer | NexusPOS{% endblock %}
{% block page_title %}{% if editing %}Edit POSCustomer{% else %}New POSCustomer{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
      <div class="form-group">
        <label>Loyalty Points</label>
        <input type="number" name="loyalty_points" value="{{ record.loyalty_points|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Total Purchases</label>
        <input type="number" step="0.01" name="total_purchases" value="{{ record.total_purchases|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Visit Count</label>
        <input type="number" name="visit_count" value="{{ record.visit_count|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Last Visit</label>
        <input type="date" name="last_visit" value="{{ record.last_visit|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Tier</label>
        <select name="tier">
          <option value="bronze" {% if record.tier == 'bronze' %}selected{% endif %}>Bronze</option>
          <option value="silver" {% if record.tier == 'silver' %}selected{% endif %}>Silver</option>
          <option value="gold" {% if record.tier == 'gold' %}selected{% endif %}>Gold</option>
          <option value="platinum" {% if record.tier == 'platinum' %}selected{% endif %}>Platinum</option>
        </select>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} POSCustomer</button>
      <a href="/poscustomers/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
